name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24.15.0"

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_ORGANIZATION_PROVIDER: ${{ secrets.CODACY_ORGANIZATION_PROVIDER }}
      CODACY_USERNAME: ${{ secrets.CODACY_USERNAME }}
      CODACY_PROJECT_NAME: ${{ secrets.CODACY_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          cache-bin: "false"
          cache-all-crates: "true"
          cache-on-failure: "true"

      - name: Restore installed tools cache
        id: tool-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin/rust-code-analysis-cli
            ~/.cargo/bin/cargo-dupes
            ~/.cargo/bin/cargo-llvm-cov
          key: tools-${{ runner.os }}-rca0.0.25-dupes0.2.1-llvmcov0.8.5

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          rustup toolchain install nightly-2026-04-18 --profile minimal
          rustup component add llvm-tools-preview --toolchain nightly-2026-04-18
      - name: Install cargo tools
        if: steps.tool-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --locked rust-code-analysis-cli --version 0.0.25
          cargo install --locked cargo-dupes --version 0.2.1
          cargo install --locked cargo-llvm-cov --version 0.8.5

      - name: Save installed tools cache
        if: always() && steps.tool-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/rust-code-analysis-cli
            ~/.cargo/bin/cargo-dupes
            ~/.cargo/bin/cargo-llvm-cov
          key: tools-${{ runner.os }}-rca0.0.25-dupes0.2.1-llvmcov0.8.5

      - name: Run quality gate
        env:
          TW_CHECK_SKIP_COVERAGE: "1"
        run: ./scripts/check.sh --verbose

      - name: Generate coverage report
        continue-on-error: true
        env:
          TW_COVERAGE_FAIL_ON_THRESHOLD: "0"
          TW_CODACY_UPLOAD: ${{ github.ref == 'refs/heads/main' && (env.CODACY_PROJECT_TOKEN != '' || (env.CODACY_API_TOKEN != '' && env.CODACY_ORGANIZATION_PROVIDER != '' && env.CODACY_USERNAME != '' && env.CODACY_PROJECT_NAME != '')) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '1' || '0' }}
          TW_CODACY_FAIL_ON_UPLOAD: "0"
        run: ./scripts/coverage.sh
